<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#161b22;
    padding:50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    font-size:2.5rem;
    margin-bottom:20px;
}

#countdown{
    font-family:Consolas,monospace;
    font-size:5rem;
    font-weight:bold;
}

#info{
    margin-top:20px;
    color:#aaa;
    font-size:1.3rem;
}
</style>

</head>
<body>

<div class="container">
    <h1>Lesson Ends In</h1>
    <div id="countdown">00:00:00.000000000</div>
    <div id="info"></div>
</div>

<script>
const lessonEnds = [
    "08:30",
    "09:25",
    "10:20",
    "11:25",
    "12:20",
    "13:15",
    "14:10",
    "15:05",
    "16:00",
    "16:55",
    "17:50"
];

const epochStart = Date.now();
const perfStart = performance.now();

function nowMs(){
    return epochStart + (performance.now() - perfStart);
}

function pad(n,l){
    return Math.floor(n).toString().padStart(l,"0");
}

function nextLessonEnd(){

    const now = new Date(nowMs());

    for(const time of lessonEnds){

        const [h,m] = time.split(":").map(Number);

        const end = new Date(now);
        end.setHours(h,m,0,0);

        if(now < end){
            return end;
        }
    }

    return null;
}

function update(){

    const target = nextLessonEnd();

    if(!target){
        document.getElementById("countdown").textContent = "School Finished!";
        document.getElementById("info").textContent = "";
        requestAnimationFrame(update);
        return;
    }

    let diff = target.getTime() - nowMs();

    if(diff < 0) diff = 0;

    const hours = Math.floor(diff / 3600000);
    diff %= 3600000;

    const minutes = Math.floor(diff / 60000);
    diff %= 60000;

    const seconds = Math.floor(diff / 1000);
    diff %= 1000;

    // First 6 digits are based on the fractional milliseconds
    const micros = Math.floor(diff * 1000);

    // Last 3 digits are completely random
    const fake = Math.floor(Math.random() * 1000);

    const nanos = micros * 1000 + fake;

    document.getElementById("countdown").textContent =
        `${pad(hours,2)}:` +
        `${pad(minutes,2)}:` +
        `${pad(seconds,2)}.` +
        `${pad(nanos,9)}`;

    document.getElementById("info").textContent =
        "Lesson ends at " +
        target.toLocaleTimeString([],{
            hour:"2-digit",
            minute:"2-digit",
            hour12:false
        });

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
