<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#161b22;
    padding:50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

h1{
    font-size:2.5rem;
    margin-bottom:20px;
}

#countdown{
    font-family:Consolas,monospace;
    font-size:4.7rem;
    font-weight:bold;
    user-select:none;
}

#info{
    margin-top:20px;
    color:#aaa;
    font-size:1.3rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>Lesson Ends In</h1>
    <div id="countdown">00:00:00.000.000000.000000.000000.000000</div>
    <div id="info"></div>
</div>

<script>

const lessonEnds = [
    "08:30",
    "09:25",
    "10:20",
    "11:25",
    "12:20",
    "13:15",
    "14:10",
    "15:05",
    "16:00",
    "16:55",
    "17:50"
];

// High precision base clock
const epochStart = Date.now();
const perfStart = performance.now();

function preciseNow(){
    return epochStart + (performance.now() - perfStart);
}

function pad(num,len){
    return Math.floor(num).toString().padStart(len,"0");
}

function randomDigits(length){
    let out = "";
    for(let i=0;i<length;i++){
        out += Math.floor(Math.random()*10);
    }
    return out;
}

function getTarget(){

    const now = new Date(preciseNow());

    for(const t of lessonEnds){

        const [h,m] = t.split(":").map(Number);

        const end = new Date(now);
        end.setHours(h,m,0,0);

        if(now < end)
            return end;
    }

    return null;
}

function update(){

    const target = getTarget();

    if(!target){
        countdown.textContent = "School Finished!";
        info.textContent = "";
        requestAnimationFrame(update);
        return;
    }

    let diff = target.getTime() - preciseNow();

    if(diff < 0) diff = 0;

    const hours = Math.floor(diff / 3600000);
    diff %= 3600000;

    const minutes = Math.floor(diff / 60000);
    diff %= 60000;

    const seconds = Math.floor(diff / 1000);
    diff %= 1000;

    // Only these are real
    const milliseconds = Math.floor(diff);

    // Everything after this is fake and random
    const fake1 = randomDigits(6);
    const fake2 = randomDigits(6);
    const fake3 = randomDigits(6);
    const fake4 = randomDigits(6);

    countdown.textContent =
        `${pad(hours,2)}:` +
        `${pad(minutes,2)}:` +
        `${pad(seconds,2)}.` +
        `${pad(milliseconds,3)}.` +
        `${fake1}.` +
        `${fake2}.` +
        `${fake3}.` +
        `${fake4}`;

    info.textContent =
        "Current lesson ends at " +
        target.toLocaleTimeString([],{
            hour:"2-digit",
            minute:"2-digit",
            hour12:false
        });

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
