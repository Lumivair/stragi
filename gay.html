<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:#161b22;
    padding:50px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

h1{
    font-size:2.2rem;
    margin-bottom:25px;
}

#time{
    font-family:Consolas,monospace;
    font-size:5rem;
    font-weight:bold;
}

#end{
    margin-top:20px;
    font-size:1.4rem;
    color:#9ca3af;
}
</style>

</head>
<body>

<div class="container">
    <h1>Lesson ends in</h1>
    <div id="time">00:00:00.000000000</div>
    <div id="end"></div>
</div>

<script>
const lessonEnds = [
    "08:30",
    "09:25",
    "10:20",
    "11:25",
    "12:20",
    "13:15",
    "14:10",
    "15:05",
    "16:00",
    "16:55",
    "17:50"
];

// High-resolution timing
const epochStart = Date.now();
const perfStart = performance.now();

function getPreciseNow() {
    return epochStart + (performance.now() - perfStart);
}

function getNextLessonEnd() {
    const now = new Date(getPreciseNow());

    for (const t of lessonEnds) {
        const [h, m] = t.split(":").map(Number);

        const end = new Date(now);
        end.setHours(h, m, 0, 0);

        if (now < end)
            return end;
    }

    return null;
}

function pad(num, len) {
    return Math.floor(num).toString().padStart(len, "0");
}

function update() {

    const target = getNextLessonEnd();

    if (!target) {
        document.getElementById("time").textContent = "School Finished!";
        document.getElementById("end").textContent = "";
        requestAnimationFrame(update);
        return;
    }

    let diff = target.getTime() - getPreciseNow();

    if(diff < 0) diff = 0;

    const hours = Math.floor(diff / 3600000);
    diff %= 3600000;

    const minutes = Math.floor(diff / 60000);
    diff %= 60000;

    const seconds = Math.floor(diff / 1000);
    diff %= 1000;

    // Fractional milliseconds
    const nanos = Math.floor(diff * 1000000); // displayed as 9 digits (not true nanoseconds)

    document.getElementById("time").textContent =
        `${pad(hours,2)}:` +
        `${pad(minutes,2)}:` +
        `${pad(seconds,2)}.` +
        `${pad(nanos,9)}`;

    document.getElementById("end").textContent =
        `Ends at ${target.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        })}`;

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
